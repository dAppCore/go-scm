version: "3"

tasks:
  build:
    dir: ../../..
    cmds:
      - go build ./...

  test:
    dir: ../../..
    cmds:
      - go test -count=1 -race ./...

  vet:
    dir: ../../..
    cmds:
      - go vet ./...

  smoke:
    dir: ../../..
    cmds:
      - |
        if [ ! -d cmd/scm ]; then
          echo "Skipping scm smoke: cmd/scm not present"
          exit 0
        fi
        bin="$(mktemp -t scm-smoke.XXXXXX)"
        trap 'rm -f "$bin"' EXIT
        go build -o "$bin" ./cmd/scm
        "$bin" --help >/dev/null
        if "$bin" dev health >/dev/null 2>&1; then
          exit 0
        fi
        "$bin" health >/dev/null

  default:
    deps:
      - build
      - test
      - vet
