<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Core SCM — Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        background:
          radial-gradient(circle at top left, rgba(99, 102, 241, 0.15), transparent 24%),
          linear-gradient(180deg, #eef2ff 0%, #f8fafc 30%, #f3f4f6 100%);
        padding: 2rem;
        color: #111827;
      }

      h1 {
        font-size: 1.65rem;
        margin: 0 auto 1.5rem;
        max-width: 960px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #0f172a;
      }

      .demo-panel {
        width: 100%;
        max-width: 960px;
        margin: 0 auto;
        height: 80vh;
        border: 1px solid rgba(226, 232, 240, 0.95);
        border-radius: 1rem;
        overflow: hidden;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(18px);
      }

      h2 {
        font-size: 1.125rem;
        margin: 2rem auto 1rem;
        max-width: 960px;
        color: #374151;
        font-weight: 700;
      }

      .standalone {
        max-width: 960px;
        margin: 0 auto 2rem;
        border: 1px solid rgba(226, 232, 240, 0.95);
        border-radius: 1rem;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.05);
        backdrop-filter: blur(18px);
      }
    </style>
    <script type="module" src="./src/index.ts"></script>
  </head>
  <body>
    <h1>Core SCM — Custom Element Demo</h1>

    <div class="demo-panel">
      <core-scm-panel api-url=""></core-scm-panel>
    </div>

    <h2>Standalone Elements</h2>

    <div class="standalone">
      <core-scm-marketplace api-url=""></core-scm-marketplace>
    </div>

    <div class="standalone">
      <core-scm-manifest api-url=""></core-scm-manifest>
    </div>

    <div class="standalone">
      <core-scm-installed api-url=""></core-scm-installed>
    </div>

    <div class="standalone">
      <core-scm-registry api-url=""></core-scm-registry>
    </div>
  </body>
</html>
